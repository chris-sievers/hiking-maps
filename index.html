<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>US Hiking Bucket List</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0c1021;
    --bg-card: #131a2e;
    --bg-card-hover: #182240;
    --bg-stat: #0e1628;
    --accent-gold: #e8b84b;
    --accent-gold-dim: rgba(232,184,75,0.15);
    --accent-rose: #d4556b;
    --accent-rose-dim: rgba(212,85,107,0.12);
    --text-primary: #e8ecf4;
    --text-secondary: #7b8bb5;
    --text-dim: #4a5677;
    --border-subtle: rgba(255,255,255,0.06);
    --tucson: #f0913a;
    --cincinnati: #4d9cf5;
    --philly: #9b6dff;
    --panel-w: 400px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg-deep); color: var(--text-primary); overflow: hidden; }
  #map { position: fixed; top: 0; left: var(--panel-w); right: 0; bottom: 0; z-index: 1; }
  #panel {
    position: fixed; top: 0; left: 0; width: var(--panel-w); height: 100vh;
    background: var(--bg-deep);
    overflow-y: auto; z-index: 2;
    border-right: 1px solid var(--border-subtle);
  }
  #panel::-webkit-scrollbar { width: 5px; }
  #panel::-webkit-scrollbar-track { background: transparent; }
  #panel::-webkit-scrollbar-thumb { background: rgba(232,184,75,0.2); border-radius: 4px; }

  /* ---- Header ---- */
  .panel-header {
    padding: 28px 24px 20px;
    background: linear-gradient(180deg, rgba(232,184,75,0.08) 0%, transparent 100%);
    border-bottom: 1px solid var(--border-subtle);
    position: sticky; top: 0; z-index: 10;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }
  .panel-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 24px; font-weight: 800; color: var(--accent-gold);
    letter-spacing: -0.3px;
  }
  .panel-header .subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 6px; font-weight: 400; }

  /* ---- Cards ---- */
  .hike-card {
    margin: 8px 14px; padding: 0; background: var(--bg-card);
    border-radius: 14px; cursor: pointer;
    transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
    border: 1px solid var(--border-subtle);
    overflow: hidden; position: relative;
  }
  .hike-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: transparent; transition: background 0.25s; border-radius: 14px 0 0 14px; z-index: 2;
  }
  .hike-card:hover { background: var(--bg-card-hover); border-color: rgba(232,184,75,0.15); transform: translateY(-1px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
  .hike-card:hover::before { background: var(--accent-gold); }
  .hike-card.active { background: var(--bg-card-hover); border-color: rgba(232,184,75,0.25); box-shadow: 0 8px 32px rgba(232,184,75,0.08), 0 0 0 1px rgba(232,184,75,0.1); }
  .hike-card.active::before { background: var(--accent-gold); }
  .card-body { padding: 18px 20px 16px; }

  /* Rank */
  .rank-badge {
    position: absolute; top: 14px; right: 16px;
    font-size: 11px; font-weight: 700; color: var(--text-dim);
    background: var(--bg-stat); border: 1px solid var(--border-subtle);
    width: 30px; height: 30px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    letter-spacing: -0.5px;
  }

  /* Name & Location */
  .hike-name {
    font-family: 'Playfair Display', serif;
    font-size: 17px; font-weight: 700; color: var(--text-primary);
    margin-bottom: 3px; padding-right: 40px; line-height: 1.3;
  }
  .hike-location { font-size: 12px; color: var(--text-secondary); margin-bottom: 14px; font-weight: 400; }

  /* Stats grid */
  .stats-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 8px; margin-bottom: 14px;
  }
  .stat-item {
    background: var(--bg-stat); border-radius: 8px; padding: 8px 10px;
    border: 1px solid var(--border-subtle);
  }
  .stat-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim); margin-bottom: 3px; font-weight: 500; }
  .stat-value { font-size: 14px; font-weight: 700; color: var(--text-primary); }
  .stat-value .unit { font-size: 10px; font-weight: 400; color: var(--text-secondary); }

  /* Difficulty */
  .difficulty-row { margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
  .diff-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim); font-weight: 500; }
  .diff-bar { display: flex; gap: 3px; align-items: center; }
  .diff-seg { width: 28px; height: 5px; border-radius: 3px; background: rgba(255,255,255,0.06); transition: background 0.2s; }
  .diff-seg.filled { background: var(--accent-rose); }
  .diff-seg.filled:nth-child(4) { background: #e06040; }
  .diff-seg.filled:nth-child(5) { background: #e83a3a; }
  .diff-text { font-size: 11px; color: var(--accent-rose); font-weight: 600; }

  /* Description */
  .desc { font-size: 12.5px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 14px; }

  /* Buttons */
  .btn-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .gmaps-btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 7px 14px; background: var(--accent-rose); color: #fff;
    border-radius: 8px; font-size: 11px; font-weight: 600;
    text-decoration: none; transition: all 0.2s;
    letter-spacing: 0.2px;
  }
  .gmaps-btn:hover { background: #c44a5e; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(212,85,107,0.3); }
  .travel-toggle {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 7px 14px; background: var(--bg-stat); color: var(--text-secondary);
    border: 1px solid var(--border-subtle); border-radius: 8px;
    font-size: 11px; cursor: pointer; transition: all 0.2s;
    font-family: 'DM Sans', sans-serif; font-weight: 500;
  }
  .travel-toggle:hover { background: var(--bg-card-hover); color: var(--text-primary); border-color: rgba(232,184,75,0.2); }
  .travel-toggle.open { background: var(--accent-gold-dim); color: var(--accent-gold); border-color: rgba(232,184,75,0.3); }

  /* Travel info */
  .travel-info { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1); }
  .travel-info.open { max-height: 500px; }
  .travel-info-inner {
    padding: 14px 20px 10px;
    background: rgba(0,0,0,0.15);
    border-top: 1px solid var(--border-subtle);
  }
  .origin-row {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid var(--border-subtle);
  }
  .origin-row:last-child { border-bottom: none; }
  .origin-dot {
    width: 8px; height: 8px; border-radius: 50%;
    margin-top: 5px; flex-shrink: 0;
    box-shadow: 0 0 6px currentColor;
  }
  .origin-dot.tucson { background: var(--tucson); color: var(--tucson); }
  .origin-dot.cincinnati { background: var(--cincinnati); color: var(--cincinnati); }
  .origin-dot.philly { background: var(--philly); color: var(--philly); }
  .origin-detail { flex: 1; }
  .origin-name { font-size: 11px; font-weight: 700; color: var(--text-primary); }
  .origin-rec { font-size: 11px; color: var(--text-secondary); margin-top: 3px; }
  .origin-note { font-size: 10px; color: var(--text-dim); margin-top: 2px; font-style: italic; }

  /* ---- Map markers ---- */
  .marker-glow {
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent-gold);
    box-shadow: 0 0 8px 3px rgba(232,184,75,0.35);
    cursor: pointer; transition: all 0.3s;
    border: 2px solid rgba(232,184,75,0.6);
  }
  .marker-glow.active {
    animation: pulseActive 1.5s ease-in-out infinite;
    background: var(--accent-gold);
    border-color: var(--accent-gold);
  }
  .marker-glow.hover-glow {
    animation: pulseHover 0.9s ease-in-out infinite;
    background: var(--accent-gold);
    border-color: var(--accent-gold);
  }
  @keyframes pulseActive {
    0%, 100% { transform: scale(1); box-shadow: 0 0 12px 5px rgba(232,184,75,0.45); }
    50% { transform: scale(1.35); box-shadow: 0 0 22px 10px rgba(232,184,75,0.6); }
  }
  @keyframes pulseHover {
    0%, 100% { transform: scale(1) translateY(0); box-shadow: 0 0 14px 6px rgba(232,184,75,0.5); }
    50% { transform: scale(1.4) translateY(-5px); box-shadow: 0 0 26px 12px rgba(232,184,75,0.7); }
  }

  /* Travel line animations */
  .travel-line-anim { stroke-dasharray: 12 8; animation: dashMove 1.5s linear infinite; }
  @keyframes dashMove { to { stroke-dashoffset: -40; } }
  .travel-icon { font-size: 18px; text-shadow: 0 0 6px rgba(0,0,0,0.8); }
  .origin-marker { width: 12px; height: 12px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 0 8px rgba(0,0,0,0.5); }

  /* Stagger card entrance */
  .hike-card { opacity: 0; animation: cardIn 0.4s ease forwards; }
  @keyframes cardIn { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }

  /* Mobile peek bar (hidden on desktop) */
  .peek-bar { display: none; }
  /* Mobile minimize button (hidden on desktop) */
  .minimize-btn { display: none; }

  /* ==================== RESPONSIVE ==================== */
  @media (max-width: 820px) {
    :root { --panel-w: 100vw; }

    #map { left: 0; top: 0; bottom: 0; right: 0; z-index: 1; }

    #panel {
      position: fixed; top: auto; left: 0; right: 0; bottom: 0;
      width: 100vw; height: 55vh;
      border-right: none; border-top: 1px solid var(--border-subtle);
      border-radius: 18px 18px 0 0;
      transition: height 0.35s cubic-bezier(0.4,0,0.2,1);
      z-index: 100;
    }
    #panel.minimized {
      height: 0; overflow: hidden; pointer-events: none;
    }

    .panel-header {
      padding: 14px 18px 12px;
      border-radius: 18px 18px 0 0;
    }
    .panel-header::before {
      content: ''; display: block; width: 36px; height: 4px;
      background: rgba(255,255,255,0.2); border-radius: 2px;
      margin: 0 auto 10px;
    }
    .panel-header h1 { font-size: 18px; }

    .hike-card { margin: 6px 10px; }
    .card-body { padding: 14px 16px 12px; }
    .hike-name { font-size: 15px; }
    .stats-grid { gap: 6px; }
    .stat-item { padding: 6px 8px; }
    .stat-value { font-size: 12px; }
    .stat-label { font-size: 8px; }
    .desc { font-size: 11.5px; margin-bottom: 10px; }
    .difficulty-row { margin-bottom: 10px; }
    .diff-seg { width: 22px; height: 4px; }

    /* Minimize button in panel header */
    .minimize-btn {
      display: inline-flex; align-items: center; gap: 5px;
      position: absolute; right: 16px; top: 18px;
      padding: 5px 12px; border-radius: 8px;
      background: var(--bg-stat); border: 1px solid var(--border-subtle);
      color: var(--text-secondary); font-size: 11px; font-weight: 500;
      font-family: 'DM Sans', sans-serif; cursor: pointer;
      transition: all 0.2s;
    }
    .minimize-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }

    /* Peek bar: visible on mobile when panel is minimized */
    .peek-bar {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 200;
      background: var(--bg-card);
      border-top: 1px solid rgba(232,184,75,0.2);
      border-radius: 16px 16px 0 0;
      padding: 10px 18px max(14px, env(safe-area-inset-bottom));
      cursor: pointer;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.5);
    }
    .peek-bar::before {
      content: ''; display: block; width: 36px; height: 4px;
      background: rgba(255,255,255,0.25); border-radius: 2px;
      margin: 0 auto 10px;
    }
    .peek-bar.visible { display: block; }
    .peek-bar .peek-name {
      font-family: 'Playfair Display', serif;
      font-size: 15px; font-weight: 700; color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .peek-bar .peek-meta {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 5px;
    }
    .peek-bar .peek-location {
      font-size: 11px; color: var(--text-secondary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      flex: 1;
    }
    .peek-bar .peek-expand {
      font-size: 11px; color: var(--accent-gold);
      font-weight: 600; flex-shrink: 0;
      padding: 3px 10px; background: var(--accent-gold-dim);
      border-radius: 12px; margin-left: 10px;
    }
  }
</style>
</head>

const DIFF_LABELS = ['', 'Easy', 'Moderate', 'Strenuous', 'Very Hard', 'Expert'];

// ==================== TRAVEL BURDEN SCORING & SORTING ====================
// Prioritize hikes drivable by the most origins, then break ties by avg travel time
function getDriveCount(hike) {
  let count = 0;
  for (const key of ['tucsonAZ','cincinnatiOH','philadelphiaPA']) {
    if (hike.travel[key].rec === 'drive') count++;
  }
  return count;
}

function getAvgTravelTime(hike) {
  let total = 0;
  for (const key of ['tucsonAZ','cincinnatiOH','philadelphiaPA']) {
    const t = hike.travel[key];
    if (t.rec === 'drive') {
      total += t.hours;
    } else {
      total += (t.flight || 0) + (t.airDrive || 0) + 2;
    }
  }
  return total / 3;
}

HIKES.sort((a, b) => {
  const driveDiff = getDriveCount(b) - getDriveCount(a); // more drivable = first
  if (driveDiff !== 0) return driveDiff;
  return getAvgTravelTime(a) - getAvgTravelTime(b); // then shorter travel time
});

function getMarkerEl(id) { return document.getElementById('marker-' + id); }

function clearActiveMarker() {
  if (activeHikeId !== null) {
    const mel = getMarkerEl(activeHikeId);
    if (mel) mel.classList.remove('active');
  }
}

// ==================== SELECT HIKE (unified) ====================
function selectHike(id, flyTo) {
  // Deselect previous
  clearActiveMarker();
  clearTravelLines();
  document.querySelectorAll('.hike-card.active').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.travel-info.open').forEach(el => el.classList.remove('open'));
  document.querySelectorAll('.travel-toggle.open').forEach(el => el.classList.remove('open'));

  // If clicking same hike, deselect
  if (activeHikeId === id) {
    activeHikeId = null;
    return;
  }

  activeHikeId = id;
  const hike = HIKES.find(h => h.id === id);

  // Activate marker
  const mel = getMarkerEl(id);
  if (mel) mel.classList.add('active');

  // Fly map
  if (flyTo && hike) {
    map.flyTo([hike.lat, hike.lng], 8, { duration: 0.8 });
  }

  // Highlight card & scroll
  const card = document.getElementById('card-' + id);
  if (card) {
    card.classList.add('active');
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  // Open travel info
  const infoEl = document.getElementById('travel-' + id);
  const toggleBtn = document.querySelector(`.travel-toggle[data-hike="${id}"]`);
  if (infoEl) infoEl.classList.add('open');
  if (toggleBtn) toggleBtn.classList.add('open');
  drawTravelLines(id);
}

  let travelHtml = '';
  for (const [key, origin] of Object.entries(ORIGINS)) {

    let recText, noteText;
    if (t.rec === 'drive') {
      recText = `🚗 Drive — ${t.hours}h`;

    } else {

    }
    travelHtml += `
      <div class="origin-row">
        <div class="origin-dot ${origin.cssClass}"></div>
        <div class="origin-detail">
          <div class="origin-name">${origin.label}</div>
          <div class="origin-rec">${recText}</div>
          <div class="origin-note">${noteText}</div>

      </div>`;
  }

  card.innerHTML = `
    <div class="card-body">
      <div class="rank-badge">#${idx + 1}</div>
      <div class="hike-name">${hike.name}</div>
      <div class="hike-location">${hike.location}</div>
      <div class="stats-grid">
        <div class="stat-item">

        <div class="stat-item">
          <div class="stat-label">Elev Gain</div>
          <div class="stat-value">${hike.gain.toLocaleString()}<span class="unit"> ft</span></div>
        </div>
      </div>
      <div class="difficulty-row">
        <div class="diff-label">Difficulty</div>
        <div class="diff-bar">${diffSegs}</div>
        <div class="diff-text">${DIFF_LABELS[hike.difficulty]}</div>
      </div>
      <div class="desc">${hike.desc}</div>
      <div class="btn-row">
        <a class="gmaps-btn" href="${gmapsUrl}" target="_blank" rel="noopener">📍 Directions</a>
        <button class="travel-toggle" data-hike="${hike.id}">🗺️ Travel Info</button>
      </div>
    </div>
    <div class="travel-info" id="travel-${hike.id}">
      <div class="travel-info-inner">${travelHtml}</div>
    </div>`;

  // Card hover -> marker bounce
  card.addEventListener('mouseenter', () => {
    const mel = getMarkerEl(hike.id);
    if (mel && activeHikeId !== hike.id) mel.classList.add('hover-glow');
  });
  card.addEventListener('mouseleave', () => {
    const mel = getMarkerEl(hike.id);
    if (mel) mel.classList.remove('hover-glow');
  });

  // Card click -> select hike (fly to + open travel)
  card.addEventListener('click', (e) => {
    if (e.target.closest('.gmaps-btn')) return;
    if (e.target.closest('.travel-toggle')) {
      // Toggle just acts as select too
      e.stopPropagation();
      selectHike(hike.id, true);
      return;
    }
    selectHike(hike.id, true);
  });

  cardList.appendChild(card);
});

let activeTravelLines = [];
let activeTravelMarkers = [];
let animationFrames = [];

function clearTravelLines() {
  activeTravelLines.forEach(l => map.removeLayer(l));
  activeTravelLines = [];
  activeTravelMarkers.forEach(m => map.removeLayer(m));
  activeTravelMarkers = [];
  animationFrames.forEach(id => cancelAnimationFrame(id));
  animationFrames = [];
}

function drawTravelLines(hikeId) {
  const hike = HIKES.find(h => h.id === hikeId);
  if (!hike) return;

  ['tucsonAZ', 'cincinnatiOH', 'philadelphiaPA'].forEach(key => {
    const origin = ORIGINS[key];
    const t = hike.travel[key];
    const from = [origin.lat, origin.lng];
    const to = [hike.lat, hike.lng];

    const line = L.polyline([from, to], {
      color: origin.color, weight: 2.5, opacity: 0.8,
      dashArray: '12 8', className: 'travel-line-anim'
    }).addTo(map);
    activeTravelLines.push(line);

    const iconChar = t.rec === 'fly' ? '✈️' : '🚗';
    animateIconAlongLine(from, to, iconChar);
  });
}

function animateIconAlongLine(from, to, iconChar) {
  const iconEl = L.divIcon({
    html: `<div class="travel-icon">${iconChar}</div>`,
    className: '', iconSize: [20, 20], iconAnchor: [10, 10]
  });
  const iconMarker = L.marker(from, { icon: iconEl, interactive: false }).addTo(map);
  activeTravelMarkers.push(iconMarker);

  const duration = 3000;
  let startTime = null;

  function step(timestamp) {
    if (!startTime) startTime = timestamp;
    const progress = ((timestamp - startTime) % duration) / duration;
    const lat = from[0] + (to[0] - from[0]) * progress;
    const lng = from[1] + (to[1] - from[1]) * progress;
    iconMarker.setLatLng([lat, lng]);
    const frameId = requestAnimationFrame(step);
    animationFrames.push(frameId);
  }
  const frameId = requestAnimationFrame(step);
  animationFrames.push(frameId);
}

// ==================== MOBILE RESPONSIVE BEHAVIOR ====================
const isMobile = () => window.matchMedia('(max-width: 820px)').matches;
const panel = document.getElementById('panel');
const peekBar = document.getElementById('peekBar');
const peekName = document.getElementById('peekName');
const peekLocation = document.getElementById('peekLocation');
const minimizeBtn = document.getElementById('minimizeBtn');

// Fly map so the point appears centered in the VISIBLE portion above the panel
function flyToVisible(lat, lng, zoom) {
  if (!isMobile()) {
    map.flyTo([lat, lng], zoom, { duration: 0.8 });
    return;
  }
  // Panel covers bottom 55vh; we want to center in the top 45vh
  // Offset the target south so it lands in the visible strip
  const panelH = panel.classList.contains('minimized') ? 70 : window.innerHeight * 0.55;
  const visibleH = window.innerHeight - panelH;
  const targetPixelY = visibleH / 2; // center of visible area
  const mapCenterPixelY = window.innerHeight / 2;
  const offsetPixels = mapCenterPixelY - targetPixelY;

  // Convert pixel offset to lat at current zoom
  const point = map.project([lat, lng], zoom);
  point.y += offsetPixels;
  const adjusted = map.unproject(point, zoom);
  map.flyTo(adjusted, zoom, { duration: 0.8 });
}

function mobileMinimize() {
  if (!isMobile()) return;
  const hike = activeHikeId ? HIKES.find(h => h.id === activeHikeId) : null;
  panel.classList.add('minimized');
  peekBar.classList.add('visible');
  if (hike) {
    peekName.textContent = hike.name;
    peekLocation.textContent = hike.location;
  } else {
    peekName.textContent = HIKES.length + ' hikes';
    peekLocation.textContent = 'Tap to browse';
  }
  setTimeout(() => {
    map.invalidateSize();
    if (hike) flyToVisible(hike.lat, hike.lng, 8);
  }, 380);
}

function mobileRestore() {
  if (!isMobile()) return;
  panel.classList.remove('minimized');
  peekBar.classList.remove('visible');
  setTimeout(() => {
    map.invalidateSize();
    if (activeHikeId) {
      const hike = HIKES.find(h => h.id === activeHikeId);
      if (hike) flyToVisible(hike.lat, hike.lng, 8);
      const card = document.getElementById('card-' + activeHikeId);
      if (card) card.scrollIntoView({ behavior:'smooth', block:'center' });
    }
  }, 380);
}

// Minimize button in header
minimizeBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  mobileMinimize();
});

// Peek bar -> restore panel
peekBar.addEventListener('click', () => mobileRestore());

// Patch selectHike for mobile: keep panel at 55%, center map in visible area
const _origSelectHike = selectHike;
selectHike = function(id, flyTo) {
  // If minimized and tapping a marker, restore panel first
  if (isMobile() && panel.classList.contains('minimized')) {
    panel.classList.remove('minimized');
    peekBar.classList.remove('visible');
    setTimeout(() => map.invalidateSize(), 50);
  }

  _origSelectHike(id, flyTo);

  // Override the flyTo to use visible-area centering on mobile
  if (isMobile() && activeHikeId !== null) {
    const hike = HIKES.find(h => h.id === activeHikeId);
    if (hike) {
      setTimeout(() => flyToVisible(hike.lat, hike.lng, 8), 100);
    }
  }
};

// On resize, reset mobile states
window.addEventListener('resize', () => {
  if (!isMobile()) {
    panel.classList.remove('minimized');
    peekBar.classList.remove('visible');
  }
  map.invalidateSize();
});
</script>
